{% extends 'base.html' %}
{% block content %}
<h2>Tags</h2>
<a href="{% url 'tag_create' %}">Add Tag</a>
<table border="1">
<tr><th>Name</th><th>Actions</th></tr>
{% for tag in tags %}
<tr>
  <td>{{ tag.name }}</td>
  <td>
    <a href="{% url 'tag_update' tag.pk %}">Edit</a> |
    <a href="{% url 'tag_delete' tag.pk %}">Delete</a>
  </td>
</tr>
{% endfor %}
</table>
{% endblock %}
